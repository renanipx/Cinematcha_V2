version: '3.8'

services:
  redis-cache:
    image: redis:7.2-alpine
    container_name: cinematcha-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - app-network
    # Ensuring container isolation: no ports are exposed to the public host interface.
    # It is only accessible to services on the internal app-network bridge.

  backend:
    build:
      context: ./backend
    container_name: app-backend
    ports:
      - "3001:3001"
    networks:
      - app-network
    depends_on:
      - redis-cache
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: app-frontend
    ports:
      - "5173:5173"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
